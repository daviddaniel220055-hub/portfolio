<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>David Daniel · Full-Stack Developer</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f6f9fc;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #0b1c33;
            line-height: 1.5;
            padding: 1.5rem 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        h1, h2, h3 {
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* header */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.2rem 2rem;
            margin-bottom: 3.5rem;
            padding: 0.5rem 0;
        }

        .logo {
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            font-weight: 700;
            background: linear-gradient(140deg, #0f2b5e, #2563eb, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .logo span {
            color: #334155;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            font-weight: 400;
            font-size: clamp(1rem, 3vw, 1.3rem);
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 2rem;
            font-weight: 500;
        }

        .nav-links a {
            text-decoration: none;
            color: #1e293b;
            transition: all 0.2s;
            font-size: 1.1rem;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .nav-links a.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        /* hero */
        .hero {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem 3rem;
            margin-bottom: 5rem;
            align-items: center;
        }

        .hero-content h1 {
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.2rem;
        }

        .typing-text {
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 4px solid #93c5fd;
            display: inline-block;
            padding-bottom: 0.2rem;
            min-width: 200px;
        }

        .hero p {
            font-size: clamp(1.1rem, 3vw, 1.3rem);
            color: #2c3e5c;
            max-width: 550px;
            margin-bottom: 2rem;
        }

        .tech-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 2rem 0;
        }

        .tech-item {
            background: white;
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,27,65,0.05);
            border: 1px solid #e0e9f2;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .tech-item:hover {
            border-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px #2563eb40;
        }

        .tech-item::after {
            content: attr(data-count);
            position: absolute;
            top: -20px;
            right: 5px;
            font-size: 0.7rem;
            background: #2563eb;
            color: white;
            padding: 0.2rem 0.4rem;
            border-radius: 20px;
            transition: top 0.2s;
        }

        .tech-item:hover::after {
            top: 2px;
        }

        .tech-item i {
            color: #2563eb;
            font-size: 1.2rem;
        }

        .hero-image {
            background: linear-gradient(145deg, #d4e2fc, #e8f0fe);
            border-radius: 40px 40px 40px 0;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f2b5e;
            font-size: 1.2rem;
            font-weight: 500;
            border: 1px solid #b3ceff;
            box-shadow: 0 30px 35px -15px rgba(37,99,235,0.2);
            background-image: radial-gradient(circle at 30px 30px, #ffffff50 2px, transparent 2px);
            background-size: 45px 45px;
            padding: 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stats-counter {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #2563eb;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #4a5f7a;
        }

        /* section titles */
        .section-title {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 650;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            border-left: 8px solid #2563eb;
            padding-left: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .section-title i {
            color: #2563eb;
            font-size: 2rem;
        }

        /* projects grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .project-card {
            background: white;
            border-radius: 40px;
            padding: clamp(1.5rem, 4vw, 2.5rem);
            box-shadow: 0 25px 40px -15px rgba(15,35,75,0.15);
            border: 1px solid #e5eef8;
            transition: all 0.3s cubic-bezier(0.2,0,0,1);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 50px -18px #2563eb60;
            border-color: #2563eb40;
        }

        .project-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .project-name {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            background: linear-gradient(145deg, #0f2b5e, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .project-link {
            background: #0f2b5e;
            color: white;
            text-decoration: none;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #1e3a6b;
            white-space: nowrap;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-link::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .project-link:hover::before {
            width: 300px;
            height: 300px;
        }

        .project-link:hover {
            background: #2563eb;
            border-color: #2563eb;
            transform: translateY(-2px);
        }

        .project-preview {
            background: #f0f6ff;
            border-radius: 24px;
            padding: 1.2rem;
            margin: 1rem 0;
            border: 1px solid #c7dfff;
            flex-grow: 1;
        }

        .preview-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #0f2b5e;
        }

        .age-calculator-demo {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .date-input {
            padding: 0.8rem;
            border: 2px solid #c7dfff;
            border-radius: 16px;
            font-size: 1rem;
            width: 100%;
        }

        .calculate-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calculate-btn:hover {
            background: #0f2b5e;
            transform: scale(1.02);
        }

        .result-display {
            background: white;
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            font-weight: 600;
            color: #0f2b5e;
        }

        .preview-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            color: #25476e;
            margin: 1rem 0;
            font-size: 0.95rem;
        }

        .preview-meta i {
            color: #2563eb;
            width: 20px;
        }

        .posts-container {
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .posts-container::-webkit-scrollbar {
            width: 8px;
        }

        .posts-container::-webkit-scrollbar-track {
            background: #d4e2fc;
            border-radius: 10px;
        }

        .posts-container::-webkit-scrollbar-thumb {
            background: #2563eb;
            border-radius: 10px;
        }

        .post-snippet {
            background: white;
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border-left: 6px solid #2563eb;
            box-shadow: 0 4px 10px rgba(0,35,70,0.05);
            transition: 0.2s;
            cursor: pointer;
        }

        .post-snippet:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 15px -5px #2563eb30;
        }

        .post-snippet strong {
            font-size: 1.1rem;
            color: #0f2b5e;
            display: block;
            margin-bottom: 0.3rem;
        }

        .post-snippet p {
            margin: 0.3rem 0 0.5rem;
            color: #334155;
            font-size: 0.95rem;
        }

        .read-more {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.9rem;
        }

        .read-more:hover {
            gap: 10px;
            color: #0f2b5e;
        }

        .badge {
            background: #e5f0ff;
            color: #0f2b5e;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #2563eb30;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .badge.clickable {
            cursor: pointer;
        }

        .badge.clickable:hover {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .badge.clickable:hover i {
            color: white;
        }

        .project-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        /* reviews section */
        .reviews-section {
            margin: 4rem 0;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .review-card {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
            border: 1px solid #e5eef8;
            transition: all 0.3s;
            position: relative;
        }

        .review-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 35px -8px #2563eb40;
            border-color: #2563eb30;
        }

        .review-quote {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 4rem;
            color: #2563eb10;
            font-family: serif;
        }

        .review-rating {
            color: #fbbf24;
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .review-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #334155;
            margin-bottom: 1.5rem;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        .reviewer {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .reviewer-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .reviewer-info h4 {
            font-size: 1.1rem;
            color: #0f2b5e;
            margin-bottom: 0.2rem;
        }

        .reviewer-info p {
            font-size: 0.9rem;
            color: #64748b;
        }

        .review-date {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.3rem;
        }

        .add-review {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            margin-top: 3rem;
            border: 2px dashed #2563eb40;
            text-align: center;
        }

        .add-review h3 {
            font-size: 1.5rem;
            color: #0f2b5e;
            margin-bottom: 1rem;
        }

        .review-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        .review-input, .reviewer-input {
            padding: 1rem 1.5rem;
            border: 2px solid #e5eef8;
            border-radius: 40px;
            font-size: 1rem;
            transition: all 0.2s;
            width: 100%;
        }

        .review-input:focus, .reviewer-input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 3px #2563eb20;
        }

        .rating-select {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 0.5rem 0;
        }

        .rating-star {
            font-size: 2rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .rating-star:hover,
        .rating-star.active {
            color: #fbbf24;
            transform: scale(1.1);
        }

        .submit-review {
            background: #2563eb;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-review:hover {
            background: #0f2b5e;
            transform: scale(1.02);
        }

        /* learning projects */
        .learning-projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 3rem 0 4rem;
        }

        .learning-card {
            background: white;
            border-radius: 32px;
            padding: 2rem 1.8rem;
            border: 1px solid #e4edf5;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .learning-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(37,99,235,0.03), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .learning-card:hover::before {
            transform: translateX(100%);
        }

        .learning-card:hover {
            border-color: #2563eb;
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -12px #2563eb30;
        }

        .learning-icon {
            background: #eaf2ff;
            width: 70px;
            height: 70px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #2563eb;
            margin-bottom: 1.8rem;
            transition: all 0.3s;
        }

        .learning-card:hover .learning-icon {
            background: #2563eb;
            color: white;
            transform: rotate(5deg);
        }

        .learning-card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.7rem;
        }

        .learning-card p {
            color: #4a5f7a;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e4edf5;
            border-radius: 10px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #2563eb;
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* contact section */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.8rem;
            margin: 2.5rem 0 3.5rem;
        }

        .contact-item {
            background: white;
            border-radius: 28px;
            padding: 1.8rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            border: 1px solid #dfecf5;
            transition: 0.2s;
            word-break: break-word;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .contact-item::after {
            content: 'click to copy';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f2b5e;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            transition: bottom 0.2s;
        }

        .contact-item:hover::after {
            bottom: 10px;
        }

        .contact-item:hover {
            background: #f6fbff;
            border-color: #2563eb;
            transform: translateY(-3px);
        }

        .contact-icon {
            background: #2563eb10;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #2563eb;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .contact-item:hover .contact-icon {
            background: #2563eb;
            color: white;
        }

        .contact-detail h4 {
            font-size: 1.1rem;
            color: #4b6589;
            font-weight: 400;
            margin-bottom: 0.3rem;
        }

        .contact-detail a, .contact-detail span {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0f2b5e;
            text-decoration: none;
            word-break: break-all;
        }

        .contact-detail a:hover {
            color: #2563eb;
            text-decoration: underline;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0f2b5e;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .footer-note {
            margin-top: 4rem;
            padding: 2rem 0;
            text-align: center;
            color: #4e6b8a;
            border-top: 1px solid #cbddee;
            font-size: 1rem;
        }

        .theme-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 999;
            transition: all 0.3s;
            border: 1px solid #e4edf5;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(37,99,235,0.3);
        }

        .theme-toggle i {
            font-size: 1.5rem;
            color: #2563eb;
        }

        body.dark-theme {
            background: #0f172a;
            color: #e2e8f0;
        }

        body.dark-theme .project-card,
        body.dark-theme .learning-card,
        body.dark-theme .contact-item,
        body.dark-theme .tech-item,
        body.dark-theme .review-card,
        body.dark-theme .add-review {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }

        body.dark-theme .project-preview,
        body.dark-theme .post-snippet {
            background: #2d3a4f;
            color: #e2e8f0;
        }

        body.dark-theme .review-text {
            color: #cbd5e1;
        }

        @media (max-width: 480px) {
            body { padding: 1rem 0.8rem; }
            .project-link { white-space: normal; text-align: center; }
            .contact-item { flex-direction: column; text-align: center; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
    </div>

    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i> <span id="notificationMessage"></span>
    </div>

<div class="container">
    <!-- header -->
    <div class="top-bar">
        <div class="logo" onclick="scrollToTop()">David Daniel <span>// full‑stack dev</span></div>
        <div class="nav-links">
            <a onclick="scrollToSection('projects')" class="nav-item">Projects</a>
            <a onclick="scrollToSection('reviews')" class="nav-item">Reviews</a>
            <a onclick="scrollToSection('contact')" class="nav-item">Contact</a>
        </div>
    </div>

    <!-- hero with dynamic typing -->
    <div class="hero" id="stack">
        <div class="hero-content">
            <h1>
                build <span class="typing-text" id="typingElement"></span>
            </h1>

    // ============= TYPING ANIMATION =============
    function initializeTyping() {
        const typingElement = document.getElementById('typingElement');
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentPhrase = portfolioData.typingPhrases[phraseIndex];
            
            if (isDeleting) {
                typingElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typingElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                setTimeout(type, 2000);
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % portfolioData.typingPhrases.length;
                setTimeout(type, 500);
            } else {
                setTimeout(type, isDeleting ? 50 : 100);
            }
        }
        type();
    }

        const statsContainer = document.getElementById('statsContainer');

                <div class="stat-label">Year</div>
            </div>
        `;

        // Animate counters
        const statNumbers = document.querySelectorAll('.stat-number');
        statNumbers.forEach(stat => {
            const target = parseFloat(stat.getAttribute('data-target'));
            let current = 0;
            const increment = target / 50;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    stat.textContent = target;
                    clearInterval(timer);
                } else {
                    stat.textContent = Math.floor(current);
                }
            }, 30);
        });
    }

    function calculateAge() {
        const birthdateInput = document.getElementById('birthdate');
        const resultDiv = document.getElementById('ageResult');
        
        if (!birthdateInput.value) {
            resultDiv.innerHTML = "Please select a birthdate";
            return;
        }

        const birthDate = new Date(birthdateInput.value);
        const today = new Date();
        
        let years = today.getFullYear() - birthDate.getFullYear();
        let months = today.getMonth() - birthDate.getMonth();
        let days = today.getDate() - birthDate.getDate();

        if (months < 0 || (months === 0 && days < 0)) {
            years--;
            months += 12;
        }

        if (days < 0) {
            const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 0);
            days += lastMonth.getDate();
            months--;
        }

        resultDiv.innerHTML = `
            <strong>${years}</strong> years, <strong>${months}</strong> months, <strong>${days}</strong> days
        `;

        showNotification(`🎂 You are ${years} years, ${months} months, and ${days} days old!`);
    }

    function initializeRatingStars() {

                const rating = parseInt(this.getAttribute('data-rating'));
                selectedRating = rating;
                
                // Update active stars
                stars.forEach((s, index) => {
                    if (index < rating) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });
        });
        // Set default 5 stars
        stars.forEach((s, index) => {
            if (index < 5) s.classList.add('active');
        });
    }

    function submitReview() {
