<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>David Daniel · Full-Stack Developer</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f6f9fc;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #0b1c33;
            line-height: 1.5;
            padding: 1.5rem 1rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ============= ANIMATIONS ============= */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 5px rgba(37,99,235,0.2);
            }
            50% {
                box-shadow: 0 0 20px rgba(37,99,235,0.5);
            }
            100% {
                box-shadow: 0 0 5px rgba(37,99,235,0.2);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes rotateIn {
            from {
                opacity: 0;
                transform: rotate(-180deg) scale(0);
            }
            to {
                opacity: 1;
                transform: rotate(0) scale(1);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        @keyframes borderGlow {
            0% {
                border-color: #2563eb20;
                box-shadow: 0 0 0 0 #2563eb20;
            }
            50% {
                border-color: #2563eb60;
                box-shadow: 0 0 0 5px #2563eb20;
            }
            100% {
                border-color: #2563eb20;
                box-shadow: 0 0 0 0 #2563eb20;
            }
        }

        @keyframes typingCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Animation Classes */
        .animate-fade-up {
            animation: fadeInUp 0.8s ease forwards;
        }

        .animate-fade-left {
            animation: fadeInLeft 0.8s ease forwards;
        }

        .animate-fade-right {
            animation: fadeInRight 0.8s ease forwards;
        }

        .animate-scale {
            animation: scaleIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .animate-glow {
            animation: glow 2s ease-in-out infinite;
        }

        .animate-pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        .animate-slide {
            animation: slideIn 0.6s ease forwards;
        }

        .stagger-item {
            opacity: 0;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, #2563eb08 1px, transparent 1px);
            background-size: 50px 50px;
            animation: backgroundMove 20s linear infinite;
        }

        @keyframes backgroundMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Gradient Text Animation */
        .gradient-text {
            background: linear-gradient(135deg, #2563eb, #7c3aed, #ec489a);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        h1, h2, h3 {
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* header */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.2rem 2rem;
            margin-bottom: 3.5rem;
            padding: 0.5rem 0;
        }

        .logo {
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            font-weight: 700;
            background: linear-gradient(140deg, #0f2b5e, #2563eb, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            transition: width 0.3s;
        }

        .logo:hover::after {
            width: 100%;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 2rem;
            font-weight: 500;
        }

        .nav-links a {
            text-decoration: none;
            color: #1e293b;
            transition: all 0.3s;
            font-size: 1.1rem;
            padding: 0.3rem 0;
            position: relative;
            cursor: pointer;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            transition: width 0.3s;
        }

        .nav-links a:hover::before {
            width: 100%;
        }

        .nav-links a:hover {
            color: #2563eb;
        }

        /* hero */
        .hero {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem 3rem;
            margin-bottom: 5rem;
            align-items: center;
        }

        .hero-content h1 {
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.2rem;
        }

        .typing-text {
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 4px solid #93c5fd;
            display: inline-block;
            padding-bottom: 0.2rem;
            min-width: 200px;
            position: relative;
        }

        .typing-text::after {
            content: '|';
            position: absolute;
            right: -10px;
            animation: typingCursor 1s infinite;
        }

        .hero p {
            font-size: clamp(1.1rem, 3vw, 1.3rem);
            color: #2c3e5c;
            max-width: 550px;
            margin-bottom: 2rem;
        }

        .tech-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 2rem 0;
        }

        .tech-item {
            background: white;
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,27,65,0.05);
            border: 1px solid #e0e9f2;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .tech-item::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(37,99,235,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .tech-item:hover::before {
            width: 300px;
            height: 300px;
        }

        .tech-item:hover {
            border-color: #2563eb;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px -12px #2563eb50;
        }

        .tech-item i {
            color: #2563eb;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .tech-item:hover i {
            transform: rotate(360deg);
        }

        .hero-image {
            background: linear-gradient(145deg, #d4e2fc, #e8f0fe);
            border-radius: 40px 40px 40px 0;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f2b5e;
            font-size: 1.2rem;
            font-weight: 500;
            border: 1px solid #b3ceff;
            box-shadow: 0 30px 35px -15px rgba(37,99,235,0.2);
            background-image: radial-gradient(circle at 30px 30px, #ffffff50 2px, transparent 2px);
            background-size: 45px 45px;
            padding: 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .hero-image:hover {
            transform: scale(1.02);
            box-shadow: 0 40px 50px -20px #2563eb60;
        }

        .stats-counter {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .stat-item {
            text-align: center;
            position: relative;
            transition: all 0.3s;
        }

        .stat-item:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #2563eb;
            transition: all 0.3s;
        }

        .stat-item:hover .stat-number {
            text-shadow: 0 0 10px #2563eb;
        }

        /* section titles */
        .section-title {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 650;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            border-left: 8px solid #2563eb;
            padding-left: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            position: relative;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(180deg, #2563eb, #7c3aed);
            animation: borderGlow 2s infinite;
        }

        /* projects grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .project-card {
            background: white;
            border-radius: 40px;
            padding: clamp(1.5rem, 4vw, 2.5rem);
            box-shadow: 0 25px 40px -15px rgba(15,35,75,0.15);
            border: 1px solid #e5eef8;
            transition: all 0.4s cubic-bezier(0.2,0,0,1);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(37,99,235,0.05), transparent);
            transition: left 0.6s;
        }

        .project-card:hover::before {
            left: 100%;
        }

        .project-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 45px 60px -25px #2563eb80;
            border-color: #2563eb60;
        }

        .project-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .project-name {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            background: linear-gradient(145deg, #0f2b5e, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: all 0.3s;
        }

        .project-card:hover .project-name {
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .project-link {
            background: #0f2b5e;
            color: white;
            text-decoration: none;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #1e3a6b;
            white-space: nowrap;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-link::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .project-link:hover::before {
            width: 200px;
            height: 200px;
        }

        .project-link:hover {
            background: #2563eb;
            border-color: #2563eb;
            transform: translateY(-3px);
            animation: pulse 0.5s ease;
        }

        .project-preview {
            background: #f0f6ff;
            border-radius: 24px;
            padding: 1.2rem;
            margin: 1rem 0;
            border: 1px solid #c7dfff;
            flex-grow: 1;
            transition: all 0.3s;
        }

        .project-card:hover .project-preview {
            background: #e8f0fe;
            transform: scale(0.98);
        }

        .preview-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #0f2b5e;
        }

        .age-calculator-demo, .quiz-demo {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .date-input {
            padding: 0.8rem;
            border: 2px solid #c7dfff;
            border-radius: 16px;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s;
        }

        .date-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px #2563eb20;
            transform: scale(1.02);
        }

        .calculate-btn, .quiz-option {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .calculate-btn::before, .quiz-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .calculate-btn:hover::before, .quiz-option:hover::before {
            left: 100%;
        }

        .calculate-btn:hover, .quiz-option:hover {
            background: #0f2b5e;
            transform: translateY(-2px) scale(1.02);
        }

        .quiz-option {
            background: white;
            color: #0f2b5e;
            border: 2px solid #c7dfff;
            text-align: left;
            padding: 0.8rem 1.2rem;
            transition: all 0.3s;
        }

        .quiz-option:hover {
            background: #e5f0ff;
            border-color: #2563eb;
            transform: translateX(8px) scale(1.01);
        }

        .quiz-option.correct {
            background: #10b981;
            color: white;
            border-color: #10b981;
            animation: pulse 0.5s ease;
        }

        .quiz-option.wrong {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .result-display {
            background: white;
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            font-weight: 600;
            color: #0f2b5e;
            transition: all 0.3s;
        }

        .preview-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            color: #25476e;
            margin: 1rem 0;
            font-size: 0.95rem;
        }

        .term-of-day {
            background: linear-gradient(135deg, #2563eb10, #7c3aed10);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            transition: all 0.3s;
        }

        .term-of-day:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #2563eb20, #7c3aed20);
        }

        .term-word {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: #e5f0ff;
            color: #0f2b5e;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #2563eb30;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .badge.clickable {
            cursor: pointer;
        }

        .badge.clickable:hover {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            transform: translateY(-2px) scale(1.05);
        }

        /* reviews section */
        .reviews-section {
            margin: 4rem 0;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .review-card {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
            border: 1px solid #e5eef8;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .review-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #2563eb10, transparent);
            opacity: 0;
            transition: opacity 0.6s;
        }

        .review-card:hover::before {
            opacity: 1;
        }

        .review-card:hover {
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 0 30px 45px -15px #2563eb60;
            border-color: #2563eb40;
        }

        .review-quote {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 4rem;
            color: #2563eb10;
            font-family: serif;
            transition: all 0.3s;
        }

        .review-card:hover .review-quote {
            color: #2563eb30;
            transform: scale(1.2);
        }

        .review-rating {
            color: #fbbf24;
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
            transition: all 0.3s;
        }

        .review-card:hover .review-rating {
            transform: scale(1.1);
        }

        .review-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #334155;
            margin-bottom: 1.5rem;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        .reviewer {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .reviewer-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .review-card:hover .reviewer-avatar {
            transform: rotate(360deg);
        }

        .add-review {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            margin-top: 3rem;
            border: 2px dashed #2563eb40;
            text-align: center;
            transition: all 0.3s;
        }

        .add-review:hover {
            border-color: #2563eb;
            transform: translateY(-5px);
            box-shadow: 0 20px 35px -12px #2563eb30;
        }

        .review-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        .review-input, .reviewer-input {
            padding: 1rem 1.5rem;
            border: 2px solid #e5eef8;
            border-radius: 40px;
            font-size: 1rem;
            transition: all 0.3s;
            width: 100%;
        }

        .review-input:focus, .reviewer-input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 3px #2563eb20;
            transform: scale(1.02);
        }

        .rating-select {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 0.5rem 0;
        }

        .rating-star {
            font-size: 2rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .rating-star:hover,
        .rating-star.active {
            color: #fbbf24;
            transform: scale(1.2);
            text-shadow: 0 0 10px #fbbf24;
        }

        .submit-review {
            background: #2563eb;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .submit-review::before {
            content: '';

        function type() {
            const currentPhrase = portfolioData.typingPhrases[phraseIndex];
            
            if (isDeleting) {
                typingElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typingElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                setTimeout(type, 2000);
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % portfolioData.typingPhrases.length;
                setTimeout(type, 500);
            } else {
                setTimeout(type, isDeleting ? 50 : 100);

                </div>

    function checkQuizAnswer(selectedIndex, buttonElement) {
        if (quizAnswered) {
            showNotification("You've already answered this question! Click 'Next Question' for another.");
            return;
        }
        
        const currentQuestion = quizQuestions[currentQuizIndex];
        const isCorrect = selectedIndex === currentQuestion.correct;
        const resultDiv = document.getElementById('quizResult');
        
        const allOptions = document.querySelectorAll('.quiz-option');
        allOptions.forEach(opt => {
            opt.disabled = true;
        });
        
        if (isCorrect) {
            buttonElement.classList.add('correct');
            resultDiv.innerHTML = "✅ Correct! Great job!";
            resultDiv.style.background = "#10b98120";
            showNotification("🎉 Correct answer!");
        } else {
            buttonElement.classList.add('wrong');
            const correctOption = allOptions[currentQuestion.correct];
            correctOption.classList.add('correct');
            resultDiv.innerHTML = `❌ Wrong! The correct answer is ${String.fromCharCode(65 + currentQuestion.correct)}. ${currentQuestion.options[currentQuestion.correct]}`;
            resultDiv.style.background = "#ef444420";
            showNotification("📚 Keep learning! Check the correct answer.");
        }
        
        quizAnswered = true;
    }
    
    function loadNextQuestion() {
        currentQuizIndex = (currentQuizIndex + 1) % quizQuestions.length;
        quizAnswered = false;
        
        const brainByteProject = portfolioData.projects.find(p => p.name === "BrainByte");
        const brainByteCard = document.querySelector('.project-card:has(.term-of-day)');
        if (brainByteCard) {
            const newContent = createBrainByteCard(brainByteProject);
            brainByteCard.outerHTML = newContent;
            
            const quizOptions = document.querySelectorAll('.quiz-option');
            quizOptions.forEach(opt => {
                const idx = parseInt(opt.getAttribute('data-opt-index'));
                opt.onclick = function() { checkQuizAnswer(idx, this); };
            });
        }
        
        showNotification("📖 New question loaded!");
    }

    function calculateAge() {
        const birthdateInput = document.getElementById('birthdate');
        const resultDiv = document.getElementById('ageResult');
        
        if (!birthdateInput.value) {
            resultDiv.innerHTML = "Please select a birthdate";
            return;
        }

        const birthDate = new Date(birthdateInput.value);
        const today = new Date();
        
        let years = today.getFullYear() - birthDate.getFullYear();
        let months = today.getMonth() - birthDate.getMonth();
        let days = today.getDate() - birthDate.getDate();

        if (months < 0 || (months === 0 && days < 0)) {
            years--;
            months += 12;
        }

        if (days < 0) {
            const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 0);
            days += lastMonth.getDate();
            months--;
        }

        resultDiv.innerHTML = `<strong>${years}</strong> years, <strong>${months}</strong> months, <strong>${days}</strong> days`;
        showNotification(`🎂 You are ${years} years, ${months} months, and ${days} days old!`);
    }

    // ============= REVIEWS SECTION =============
    function loadReviews() {
        const reviewsGrid = document.getElementById('reviewsGrid');
        reviewsGrid.innerHTML = portfolioData.reviews.map(review => `
            <div class="review-card scroll-reveal">
                <div class="review-quote">"</div>
                <div class="review-rating">
                    ${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}

                <div class="reviewer">
                    <div class="reviewer-avatar">${review.avatar}</div>
                    <div class="reviewer-info">
                        <h4>${review.name}</h4>
                        <p>${review.role}</p>
                        <div class="review-date">${review.date}</div>
                    </div>

            </div>
        `).join('');
    }

    function initializeRatingStars() {
        const stars = document.querySelectorAll('.rating-star');
        stars.forEach(star => {
            star.addEventListener('click', function() {
                const rating = parseInt(this.getAttribute('data-rating'));
                selectedRating = rating;
                
                stars.forEach((s, index) => {
                    if (index < rating) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });
        });
        stars.forEach((s, index) => {
            if (index < 5) s.classList.add('active');
        });
    }

    function submitReview() {
        const name = document.getElementById('reviewerName').value;
        const text = document.getElementById('reviewText').value;
        
        if (!name || !text) {
            showNotification("⚠️ Please fill in your name and review");
            return;
        }

        const newReview = {
            id: portfolioData.reviews.length + 1,
            name: name,
            role: "Client",
            rating: selectedRating,
            text: text,
            date: new Date().toLocaleString('default', { month: 'long', year: 'numeric' }),
            avatar: name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase()
        };

        portfolioData.reviews.unshift(newReview);
        loadReviews();
        
        document.getElementById('reviewerName').value = '';
        document.getElementById('reviewText').value = '';
        
        selectedRating = 5;
        const stars = document.querySelectorAll('.rating-star');
        stars.forEach((s, index) => {
            if (index < 5) s.classList.add('active');
        });

        showNotification("✅ Thank you for your review!");
    }

    // ============= UTILITY FUNCTIONS =============
    function copyToClipboard(text, type) {
        navigator.clipboard.writeText(text).then(() => {
            showNotification(`📋 ${type} copied to clipboard!`);
        });
    }

    function showNotification(message) {
        const notification = document.getElementById('notification');
        const messageSpan = document.getElementById('notificationMessage');
        messageSpan.textContent = message;
        notification.classList.add('show');
        setTimeout(() => {
            notification.classList.remove('show');
        }, 3000);
    }

    function checkAvailability() {
        const statuses = ["✅ available for hire", "📅 open to freelance", "🚀 ready for new projects", "💼 accepting offers"];
        const randomStatus = statuses[Math.floor(Math.random() * statuses.length)];
        document.getElementById('availabilityText').textContent = randomStatus;

    // ============= THEME TOGGLE =============
    function toggleTheme() {
        document.body.classList.toggle('dark-theme');
        const icon = document.querySelector('.theme-toggle i');
        if (document.body.classList.contains('dark-theme')) {
            icon.className = 'fas fa-sun';
            showNotification("🌙 Dark mode enabled");
        } else {
            icon.className = 'fas fa-moon';
            showNotification("☀️ Light mode enabled");
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const notification = document.getElementById('notification');
            notification.classList.remove('show');
        }
    });
</script>
